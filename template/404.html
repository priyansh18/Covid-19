{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container" style="min-height:60vh; display:flex; align-items:center; justify-content:center;">
  <div class="text-center py-5">
    <div style="font-size:5rem; font-weight:800; color:var(--primary); line-height:1;">404</div>
    <h1 class="h4 fw-bold mt-3 mb-2">Page Not Found</h1>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{% url 'home' %}" class="btn btn-primary">
      <i class="fas fa-home me-2" aria-hidden="true"></i>Return to Dashboard
    </a>
  </div>
</div>
{% endblock %}
